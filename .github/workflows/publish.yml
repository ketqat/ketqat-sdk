name: Publish release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Run credential-free release preflight
        run: scripts/release-preflight.sh "$GITHUB_REF_NAME"

  publish-npm:
    needs: preflight
    if: needs.preflight.result == 'success' && vars.RELEASE_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.5.1

      - name: Build the validated npm package
        run: |
          npm ci --ignore-scripts
          npm run build
          npm run verify:package-contents

      - name: Publish to npm with OIDC and provenance
        run: npm publish --access public --provenance

  publish-pypi:
    needs: preflight
    if: needs.preflight.result == 'success' && vars.RELEASE_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build python
          python scripts/verify-python-distributions.py python/dist

      - name: Publish to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist
