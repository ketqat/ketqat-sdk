name: Publish release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Run credential-free release preflight
        run: scripts/release-preflight.sh "$GITHUB_REF_NAME"

  publish-npm:
    needs: preflight
    if: needs.preflight.result == 'success' && vars.RELEASE_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.5.1

      - name: Build the validated npm package
        run: |
          npm ci --ignore-scripts
          npm run build
          npm run verify:package-contents
          mkdir release-artifacts
          npm pack --ignore-scripts --pack-destination release-artifacts

      - name: Preserve the npm artifact before publishing
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-release-artifact
          path: release-artifacts/*.tgz
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      - name: Publish to npm with OIDC and provenance
        run: npm publish release-artifacts/*.tgz --access public --provenance

  publish-pypi:
    needs: preflight
    if: needs.preflight.result == 'success' && vars.RELEASE_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build python
          python scripts/verify-python-distributions.py python/dist

      - name: Preserve the Python artifacts before publishing
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-release-artifacts
          path: python/dist/*
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      - name: Publish to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist
          attestations: true

  verify-and-release:
    needs: [publish-npm, publish-pypi]
    if: needs.publish-npm.result == 'success' && needs.publish-pypi.result == 'success' && vars.RELEASE_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: github-release
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Download the published npm artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-release-artifact
          path: release-artifacts

      - name: Download the published Python artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pypi-release-artifacts
          path: release-artifacts

      - name: Verify registry metadata and exact artifact digests
        run: node scripts/check-registry-readback.mjs "${GITHUB_REF_NAME#v}" release-artifacts

      - name: Clean-install from public registries
        run: |
          npm install --global npm@11.5.1
          scripts/verify-registry-installs.sh "${GITHUB_REF_NAME#v}"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release-artifacts/*

      - name: Create verified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-artifacts/* \
            --verify-tag \
            --title "KetQat ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --notes "Both npm and PyPI publication were verified by API digest readback, PyPI Integrity API publish attestations, and clean registry installs before this release was created. Attached artifacts have GitHub build-provenance attestations; verify them with: gh attestation verify <artifact> --repo ketqat/ketqat-sdk. npm provenance can be checked from an installed package with: npm audit signatures. Recovery policy: https://github.com/ketqat/ketqat-sdk/blob/main/docs/release-recovery.md"
