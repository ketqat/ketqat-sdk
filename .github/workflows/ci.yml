name: SDK CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm test

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runner with real QEC dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "python[qec]"
          python -m pip install pytest

      - name: Run Python tests
        run: pytest python/tests

      - name: Smoke-test real QEC runner
        run: ketqat run surface-code-memory --output /tmp/ketqat-qec-run.json

  quickstart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify clone-free quickstart
        run: npm run verify:quickstart
